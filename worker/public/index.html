<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Summarizer</title>
<style>
  /* Palette mirrors the extension panel's T tokens: dark neutral, teal + amber, no blue. */
  :root {
    --bg: #14110f; --panel: #1d1a17; --panel-2: #262220; --line: #322c28;
    --ink: #ece6df; --ink-dim: #a2988d; --ink-faint: #6e655d;
    --teal: #4db6a4; --amber: #d9a441; --red: #c9635b;
    --sidebar: 340px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }

  /* Scrollbars. The platform default renders as a pale strip that fights a dark page, so
     both scroll regions get a thin transparent-track bar. The thumb is inset via a
     transparent border + background-clip, which is what keeps it from touching the edge. */
  * { scrollbar-width: thin; scrollbar-color: #3d3630 transparent; }
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: #3a332e; border-radius: 999px;
    border: 3px solid transparent; background-clip: content-box;
  }
  ::-webkit-scrollbar-thumb:hover { background: #564d45; background-clip: content-box; }
  ::-webkit-scrollbar-corner { background: transparent; }

  /* Reading layout: summary list rails on the LEFT, the chosen summary reads to its right. */
  .shell { display: grid; grid-template-columns: var(--sidebar) 1fr; height: 100vh; }

  /* ---------- main reading area ---------- */
  .reader { overflow-y: auto; padding: 0 0 80px; }
  .reader-inner { max-width: 780px; margin: 0 auto; padding: 0 28px; }
  .hero { width: 100%; display: block; border-radius: 12px; border: 1px solid var(--line);
    margin: 28px 0 8px; cursor: zoom-in; background: var(--panel-2); }
  .hero-cap { color: var(--ink-faint); font-size: 12px; margin: 0 0 26px; text-align: center; }
  .doc-title { font-size: 28px; line-height: 1.25; margin: 30px 0 10px; font-weight: 650;
    letter-spacing: -.2px; }
  .doc-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    font-size: 12px; color: var(--ink-faint); margin-bottom: 8px; }
  .doc-meta a { color: var(--teal); text-decoration: none; }

  /* Document-style summary body */
  .doc { font-size: 16px; }
  .doc h1, .doc h2 { font-size: 17px; margin: 28px 0 8px; letter-spacing: .01em; }
  .doc h3 { font-size: 15px; margin: 22px 0 6px; color: var(--ink-dim); }
  .doc p { margin: 0 0 14px; color: #ded6cd; }
  .doc ul, .doc ol { margin: 0 0 16px; padding-left: 22px; color: #ded6cd; }
  .doc li { margin: 0 0 7px; }
  .doc strong { color: var(--ink); font-weight: 640; }
  .doc code { background: var(--panel-2); border: 1px solid var(--line); border-radius: 4px;
    padding: 1px 5px; font-size: 13px; }
  .doc pre { background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 12px 14px; overflow-x: auto; }
  .doc blockquote { border-left: 2px solid var(--teal); margin: 0 0 14px; padding: 2px 0 2px 14px;
    color: var(--ink-dim); }
  .doc hr { border: none; border-top: 1px solid var(--line); margin: 26px 0; }
  .doc table { border-collapse: collapse; width: 100%; font-size: 14px; }
  .doc th, .doc td { border: 1px solid var(--line); padding: 7px 11px; text-align: left;
    vertical-align: top; }
  .doc thead th { background: var(--panel-2); color: var(--ink); font-weight: 620;
    font-size: 12px; letter-spacing: .04em; text-transform: uppercase; white-space: nowrap; }
  .doc tbody tr:nth-child(even) { background: rgba(255,255,255,.017); }
  .doc tbody td { color: #ded6cd; }
  /* Wide tables scroll inside their own box — the page body must never scroll sideways. */
  .table-wrap { overflow-x: auto; margin: 0 0 18px; border-radius: 8px;
    border: 1px solid var(--line); }
  .table-wrap table { border: none; }
  .table-wrap th:first-child, .table-wrap td:first-child { border-left: none; }
  .table-wrap th:last-child, .table-wrap td:last-child { border-right: none; }
  .table-wrap thead th { border-top: none; }
  .table-wrap tbody tr:last-child td { border-bottom: none; }

  /* 16:9 embed of the source video */
  .video { position: relative; width: 100%; aspect-ratio: 16 / 9; margin: 18px 0 26px;
    border-radius: 10px; overflow: hidden; border: 1px solid var(--line); background: #000; }
  .video iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }

  .placeholder { color: var(--ink-faint); text-align: center; padding-top: 34vh; }
  .placeholder h2 { font-size: 15px; color: var(--ink-dim); margin: 0 0 6px; }

  /* ---------- left rail ---------- */
  .rail { border-right: 1px solid var(--line); background: var(--panel);
    display: flex; flex-direction: column; min-height: 0; }
  .rail-head { padding: 14px 14px 10px; border-bottom: 1px solid var(--line); }
  .rail-head h1 { font-size: 14px; margin: 0 0 9px; font-weight: 650; display: flex; gap: 8px; }
  .rail-head .n { color: var(--ink-faint); font-weight: 400; }
  #q { width: 100%; padding: 7px 10px; border-radius: 7px; border: 1px solid var(--line);
    background: var(--bg); color: var(--ink); font: inherit; font-size: 13px; }
  .rail-list { overflow-y: auto; flex: 1; padding: 6px; }

  .item { display: flex; gap: 10px; padding: 8px; border-radius: 8px; cursor: pointer;
    border: 1px solid transparent; }
  .item:hover { background: var(--panel-2); }
  .item.sel { background: var(--panel-2); border-color: var(--teal); }
  .item-thumb { width: 68px; height: 38px; border-radius: 4px; object-fit: cover; flex: none;
    background: var(--bg); border: 1px solid var(--line); }
  .item-thumb.empty { display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--ink-faint); }
  .item-body { min-width: 0; flex: 1; }
  .item-title { font-size: 12.5px; line-height: 1.35; margin: 0 0 3px; color: var(--ink);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .item-meta { font-size: 10.5px; color: var(--ink-faint); display: flex; gap: 6px; flex-wrap: wrap; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor;
    display: inline-block; margin-right: 4px; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .25 } }
  .tag { border-radius: 999px; padding: 0 6px; border: 1px solid var(--line); }
  .tag.streaming { color: var(--teal); border-color: var(--teal); }
  .tag.generating { color: var(--amber); border-color: var(--amber); }
  .tag.error { color: var(--red); border-color: var(--red); }
  .rail-foot { border-top: 1px solid var(--line); padding: 7px 12px; font-size: 11px;
    color: var(--ink-faint); display: flex; justify-content: space-between; }
  .del { background: none; border: none; color: var(--ink-faint); cursor: pointer; font-size: 11px; }
  .del:hover { color: var(--red); }

  #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.93); display: none;
    align-items: center; justify-content: center; z-index: 50; cursor: zoom-out; padding: 18px; }
  #lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; }

  .tokenbar { padding: 40px 20px; max-width: 460px; margin: 0 auto; }
  .tokenbar input { width: 100%; padding: 9px 11px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--panel); color: var(--ink); font: inherit; }
  .tokenbar button { margin-top: 10px; padding: 8px 14px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--teal); background: transparent; color: var(--teal); font: inherit; }

  @media (max-width: 900px) {
    /* Stacked: the list is the nav, so it sits on top and the reader takes the rest. */
    .shell { grid-template-columns: 1fr; grid-template-rows: 40vh 1fr; }
    .rail { border-right: none; border-bottom: 1px solid var(--line); }
  }
</style>
</head>
<body>
<div id="auth" class="tokenbar" hidden>
  <h1>Summarizer</h1>
  <p style="color:var(--ink-dim);font-size:14px">Paste the app token to view your summaries.</p>
  <input id="tok" type="password" placeholder="APP_TOKEN" autocomplete="off" />
  <button id="save">Unlock</button>
</div>

<div class="shell" id="app" hidden>
  <aside class="rail">
    <div class="rail-head">
      <h1>Summarizer <span class="n" id="count"></span></h1>
      <input id="q" type="search" placeholder="Filter by title…" autocomplete="off" />
    </div>
    <div class="rail-list" id="list"></div>
    <div class="rail-foot"><span id="tick"></span><span id="live-n"></span></div>
  </aside>
  <div class="reader" id="reader">
    <div class="reader-inner" id="reader-inner">
      <div class="placeholder"><h2>Pick a summary</h2><p>The poster reads as the hero, the summary sits underneath.</p></div>
    </div>
  </div>
</div>

<div id="lightbox"><img id="lightbox-img" alt="" /></div>

<script>
const $ = (s) => document.querySelector(s);
let TOKEN = localStorage.getItem('summarizer_token') || new URLSearchParams(location.search).get('token');
if (TOKEN) localStorage.setItem('summarizer_token', TOKEN);

let ALL = [];
let selId = null;
let filter = '';

// Deep link: the extension opens /?token=…#s=<encoded summary id> to jump straight to one
// summary. Capture it before the token gets scrubbed from the address bar. Cleared once used
// so the 4s rail refresh never yanks the reader back to it.
function readHashId() {
  const m = /[#&]s=([^&]+)/.exec(location.hash || '');
  try { return m ? decodeURIComponent(m[1]) : null; } catch { return null; }
}
let deepLinkId = readHashId();

const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) =>
  ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

const ago = (ms) => {
  const s = Math.floor((Date.now() - ms) / 1000);
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s / 60)}m ago`;
  if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
  return `${Math.floor(s / 86400)}d ago`;
};

async function api(path, opts = {}) {
  const r = await fetch(path, {
    ...opts,
    headers: { Authorization: `Bearer ${TOKEN}`, 'Content-Type': 'application/json', ...(opts.headers || {}) },
  });
  if (r.status === 401) { localStorage.removeItem('summarizer_token'); location.reload(); }
  return r.json();
}

/**
 * Minimal markdown → HTML. Deliberately hand-rolled rather than pulling marked+DOMPurify:
 * the only author of this text is our own LLM output, and everything that could carry markup
 * is escaped BEFORE any tag is emitted, so no raw HTML from the source can survive.
 */
function md(src) {
  const lines = esc(src).split('\n');
  let out = '', inList = false, listTag = 'ul', inCode = false, i = 0;

  const inline = (t) => t
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/(^|[\s(])\*([^*\n]+)\*/g, '$1<em>$2</em>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
  const closeList = () => { if (inList) { out += `</${listTag}>`; inList = false; } };

  // A pipe row is only a table if the NEXT line is a |---|---| separator — which is exactly
  // why the old line-at-a-time loop couldn't do this and fell back to printing the pipes.
  const isRow = (l) => l !== undefined && /\|/.test(l) && /^\s*\|?[^|]*\|/.test(l.trim());
  const isSep = (l) => l !== undefined && /-/.test(l) && /\|/.test(l) && /^[\s|:-]+$/.test(l.trim());
  const cells = (l) => {
    let t = l.trim();
    if (t.startsWith('|')) t = t.slice(1);
    if (t.endsWith('|')) t = t.slice(0, -1);
    return t.split('|').map((c) => c.trim());
  };
  const alignOf = (sepCell) => {
    const s = sepCell.trim();
    if (s.startsWith(':') && s.endsWith(':')) return ' style="text-align:center"';
    if (s.endsWith(':')) return ' style="text-align:right"';
    return '';
  };

  for (; i < lines.length; i++) {
    const line = lines[i].replace(/\s+$/, '');

    if (/^```/.test(line)) { closeList(); inCode = !inCode; out += inCode ? '<pre><code>' : '</code></pre>'; continue; }
    if (inCode) { out += line + '\n'; continue; }
    if (!line.trim()) { closeList(); continue; }

    // --- table ---
    if (isRow(line) && isSep(lines[i + 1])) {
      closeList();
      const head = cells(line);
      const aligns = cells(lines[i + 1]).map(alignOf);
      let body = '';
      let j = i + 2;
      for (; j < lines.length && isRow(lines[j]) && lines[j].trim(); j++) {
        const row = cells(lines[j]);
        body += '<tr>' + head.map((_, c) =>
          `<td${aligns[c] ?? ''}>${inline(row[c] ?? '')}</td>`).join('') + '</tr>';
      }
      out += '<div class="table-wrap"><table><thead><tr>' +
        head.map((h, c) => `<th${aligns[c] ?? ''}>${inline(h)}</th>`).join('') +
        `</tr></thead><tbody>${body}</tbody></table></div>`;
      i = j - 1;
      continue;
    }

    let m;
    if ((m = /^(#{1,6})\s+(.*)$/.exec(line))) { closeList(); const h = Math.min(m[1].length + 1, 4); out += `<h${h}>${inline(m[2])}</h${h}>`; continue; }
    if (/^(---|\*\*\*)$/.test(line.trim())) { closeList(); out += '<hr />'; continue; }
    if ((m = /^>\s?(.*)$/.exec(line))) { closeList(); out += `<blockquote>${inline(m[1])}</blockquote>`; continue; }
    if ((m = /^[-*]\s+(.*)$/.exec(line))) {
      if (!inList || listTag !== 'ul') { closeList(); out += '<ul>'; inList = true; listTag = 'ul'; }
      out += `<li>${inline(m[1])}</li>`; continue;
    }
    if ((m = /^\d+\.\s+(.*)$/.exec(line))) {
      if (!inList || listTag !== 'ol') { closeList(); out += '<ol>'; inList = true; listTag = 'ol'; }
      out += `<li>${inline(m[1])}</li>`; continue;
    }
    closeList();
    out += `<p>${inline(line)}</p>`;
  }
  closeList();
  if (inCode) out += '</code></pre>';
  return out;
}

function railItem(s) {
  const streaming = s.gen_state === 'streaming';
  const posterGen = s.poster_state === 'generating' || s.poster_state === 'queued';
  const thumb = s.poster_key
    ? `<img class="item-thumb" src="/poster/${encodeURIComponent(s.poster_key)}" loading="lazy" alt="" />`
    : `<div class="item-thumb empty">${posterGen ? '◴' : '—'}</div>`;
  const tags = [];
  if (streaming) tags.push('<span class="tag streaming"><span class="dot"></span>summarizing</span>');
  if (posterGen) tags.push('<span class="tag generating"><span class="dot"></span>image</span>');
  if (s.gen_state === 'error') tags.push('<span class="tag error">failed</span>');
  if (!s.model_id) tags.push('<span class="tag">no summary</span>');
  return `<div class="item ${s.id === selId ? 'sel' : ''}" data-id="${esc(s.id)}">
    ${thumb}
    <div class="item-body">
      <p class="item-title">${esc(s.title || s.url)}</p>
      <div class="item-meta">${tags.join('')}<span>${esc(s.model_icon || '')} ${esc(s.model_name || '')}</span><span>${ago(s.updated_at)}</span></div>
    </div>
  </div>`;
}

function renderRail() {
  const f = filter.toLowerCase();
  const rows = f ? ALL.filter((s) => (s.title || s.url).toLowerCase().includes(f)) : ALL;
  $('#list').innerHTML = rows.length ? rows.map(railItem).join('')
    : '<p style="color:var(--ink-faint);font-size:12px;padding:14px">No matches.</p>';
  $('#count').textContent = f ? `${rows.length}/${ALL.length}` : ALL.length;
  const live = ALL.filter((s) => s.gen_state === 'streaming' || s.poster_state === 'generating').length;
  $('#live-n').textContent = live ? `${live} running` : '';
  $('#tick').textContent = new Date().toLocaleTimeString();
}

async function open(id) {
  selId = id;
  renderRail();
  // Keep the address bar pointing at the open summary so it stays a shareable deep link.
  history.replaceState({}, '', location.pathname + `#s=${encodeURIComponent(id)}`);
  // Bring the selected rail row into view (it may be far down a long list, or off-screen
  // entirely when arrived at via deep link).
  const selEl = [...document.querySelectorAll('.item')].find((el) => el.dataset.id === id);
  if (selEl) selEl.scrollIntoView({ block: 'nearest' });
  const { summary, generations = [], poster } = await api(`/api/summary/${encodeURIComponent(id)}`);
  if (!summary) return;
  // Prefer a real generation over an imported one when a page has both.
  const gen = generations.find((g) => g.model_id !== 'imported') || generations[0];
  const key = poster?.r2_key;

  // Derive the embed id from the summary's OWN url, NOT the separate video_id column.
  // video_id was observed getting polluted by the tab the user summarized FROM, so trusting
  // it embedded the wrong video. The url is keyed to the summary itself; only embed when it
  // actually carries a watch id. youtube-nocookie keeps the reader from seeding tracking
  // cookies just by being open.
  const vm = /[?&]v=([A-Za-z0-9_-]{11})/.exec(summary.url || summary.id || '');
  const vid = vm ? vm[1] : null;

  $('#reader-inner').innerHTML = `
    ${key ? `<img class="hero" id="hero" src="/poster/${encodeURIComponent(key)}" alt="" />
             <p class="hero-cap">Click to view full resolution</p>` : ''}
    <h1 class="doc-title">${esc(summary.title || summary.url)}</h1>
    <div class="doc-meta">
      ${gen ? `<span>${esc(gen.model_icon || '')} ${esc(gen.model_name || '')}</span>` : '<span>no summary yet</span>'}
      ${gen?.duration_ms ? `<span>· ${(gen.duration_ms / 1000).toFixed(1)}s</span>` : ''}
      <span>· ${ago(summary.updated_at)}</span>
      <span>· <a href="${esc(summary.url)}" target="_blank" rel="noreferrer">watch ↗</a></span>
      ${summary.transcript ? `<span>· ${(summary.transcript.length / 1000).toFixed(0)}k transcript</span>` : ''}
    </div>
    ${vid ? `<div class="video"><iframe src="https://www.youtube-nocookie.com/embed/${vid}"
        title="${esc(summary.title || '')}" loading="lazy" allowfullscreen
        allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        referrerpolicy="strict-origin-when-cross-origin"></iframe></div>` : ''}
    <div class="doc">${gen?.content
      ? md(gen.content)
      : '<p style="color:var(--ink-faint)">Transcript imported, but no summary was generated for this one yet.</p>'}</div>`;
  $('#reader').scrollTop = 0;
}

async function refresh() {
  const { summaries = [] } = await api('/api/summaries');
  ALL = summaries;
  renderRail();
  if (!selId) {
    if (deepLinkId) { const want = deepLinkId; deepLinkId = null; open(want); }
    else if (ALL.length) open(ALL[0].id);
  }
}

$('#list').addEventListener('click', (e) => {
  const it = e.target.closest('.item');
  if (it) open(it.dataset.id);
});
$('#q').addEventListener('input', (e) => { filter = e.target.value; renderRail(); });
document.addEventListener('click', (e) => {
  if (e.target.id === 'hero') { $('#lightbox-img').src = e.target.src; $('#lightbox').style.display = 'flex'; }
  else if (e.target.closest('#lightbox')) $('#lightbox').style.display = 'none';
});

$('#save').onclick = () => {
  TOKEN = $('#tok').value.trim();
  if (!TOKEN) return;
  localStorage.setItem('summarizer_token', TOKEN);
  location.href = location.pathname;
};

if (!TOKEN) {
  $('#auth').hidden = false;
} else {
  $('#app').hidden = false;
  // Keep the token out of the URL bar, but preserve the #s= deep link so the address stays shareable.
  history.replaceState({}, '', location.pathname + (deepLinkId ? `#s=${encodeURIComponent(deepLinkId)}` : ''));
  refresh();
  // Only the rail refreshes on a timer — re-fetching the open document every 4s would
  // yank the page out from under someone mid-read.
  setInterval(refresh, 4000);
}
</script>
</body>
</html>
