<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Summarizer</title>
<style>
  /* Palette mirrors the extension panel's T tokens: dark neutral, teal + amber, no blue. */
  :root {
    --bg: #14110f; --panel: #1d1a17; --panel-2: #262220; --line: #322c28;
    --ink: #ece6df; --ink-dim: #a2988d; --ink-faint: #6e655d;
    --teal: #4db6a4; --amber: #d9a441; --red: #c9635b;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  header { position: sticky; top: 0; z-index: 5; background: rgba(20,17,15,.92);
    backdrop-filter: blur(8px); border-bottom: 1px solid var(--line);
    padding: 14px 20px; display: flex; gap: 14px; align-items: center; }
  h1 { font-size: 16px; margin: 0; letter-spacing: .2px; font-weight: 600; }
  .spacer { flex: 1; }
  .count { color: var(--ink-faint); font-size: 13px; }
  main { max-width: 1100px; margin: 0 auto; padding: 20px; }
  h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .09em;
    color: var(--ink-faint); margin: 26px 0 10px; font-weight: 600; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 14px 16px; margin-bottom: 10px; display: flex; gap: 14px; align-items: flex-start; }
  .card.live { border-color: var(--teal); }
  .thumb { width: 132px; height: 74px; border-radius: 6px; object-fit: cover;
    background: var(--panel-2); flex: none; border: 1px solid var(--line); cursor: zoom-in; }
  .thumb.empty { display: flex; align-items: center; justify-content: center;
    color: var(--ink-faint); font-size: 11px; cursor: default; text-align: center; padding: 4px; }
  .body { flex: 1; min-width: 0; }
  .title { font-weight: 600; margin: 0 0 4px; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; }
  .title a { color: var(--ink); text-decoration: none; }
  .title a:hover { color: var(--teal); }
  .excerpt { color: var(--ink-dim); font-size: 13px; margin: 5px 0 0;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    font-size: 12px; color: var(--ink-faint); }
  .pill { border: 1px solid var(--line); border-radius: 999px; padding: 1px 8px;
    background: var(--panel-2); }
  .pill.model { color: var(--ink-dim); }
  .pill.streaming { color: var(--teal); border-color: var(--teal); }
  .pill.generating { color: var(--amber); border-color: var(--amber); }
  .pill.error { color: var(--red); border-color: var(--red); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor;
    display: inline-block; margin-right: 5px; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .25 } }
  .del { background: none; border: 1px solid var(--line); color: var(--ink-faint);
    border-radius: 6px; cursor: pointer; padding: 3px 8px; font-size: 12px; flex: none; }
  .del:hover { color: var(--red); border-color: var(--red); }
  .empty-state { color: var(--ink-faint); padding: 40px 0; text-align: center; }
  #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.9); display: none;
    align-items: center; justify-content: center; z-index: 50; cursor: zoom-out; padding: 20px; }
  #lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .tokenbar { padding: 40px 20px; max-width: 460px; margin: 0 auto; }
  .tokenbar input { width: 100%; padding: 9px 11px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--panel); color: var(--ink); font: inherit; }
  .tokenbar button { margin-top: 10px; padding: 8px 14px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--teal); background: transparent; color: var(--teal); font: inherit; }
</style>
</head>
<body>
<div id="auth" class="tokenbar" hidden>
  <h1>Summarizer</h1>
  <p style="color:var(--ink-dim);font-size:14px">Paste the app token to view your summaries.</p>
  <input id="tok" type="password" placeholder="APP_TOKEN" autocomplete="off" />
  <button id="save">Unlock</button>
</div>

<div id="app" hidden>
  <header>
    <h1>Summarizer</h1>
    <span class="count" id="count"></span>
    <span class="spacer"></span>
    <span class="count" id="tick"></span>
  </header>
  <main>
    <section id="live-wrap" hidden>
      <h2>Running now</h2>
      <div id="live"></div>
    </section>
    <section>
      <h2>Past summaries</h2>
      <div id="past"></div>
    </section>
  </main>
</div>

<div id="lightbox"><img id="lightbox-img" alt="" /></div>

<script>
const $ = (s) => document.querySelector(s);
let TOKEN = localStorage.getItem('summarizer_token') || new URLSearchParams(location.search).get('token');
if (TOKEN) localStorage.setItem('summarizer_token', TOKEN);

const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) =>
  ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

const ago = (ms) => {
  const s = Math.floor((Date.now() - ms) / 1000);
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s / 60)}m ago`;
  if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
  return `${Math.floor(s / 86400)}d ago`;
};

async function api(path, opts = {}) {
  const r = await fetch(path, {
    ...opts,
    headers: { Authorization: `Bearer ${TOKEN}`, 'Content-Type': 'application/json', ...(opts.headers || {}) },
  });
  if (r.status === 401) { localStorage.removeItem('summarizer_token'); location.reload(); }
  return r.json();
}

function card(s) {
  const streaming = s.gen_state === 'streaming';
  const posterGen = s.poster_state === 'generating' || s.poster_state === 'queued';
  const thumb = s.poster_key
    ? `<img class="thumb" src="/poster/${encodeURIComponent(s.poster_key)}" data-full="/poster/${encodeURIComponent(s.poster_key)}" alt="" />`
    : `<div class="thumb empty">${posterGen ? 'rendering…' : s.poster_state === 'error' ? 'poster failed' : 'no poster'}</div>`;

  const pills = [];
  if (streaming) pills.push(`<span class="pill streaming"><span class="dot"></span>summarizing</span>`);
  if (s.gen_state === 'error') pills.push(`<span class="pill error">summary failed</span>`);
  if (posterGen) pills.push(`<span class="pill generating"><span class="dot"></span>image</span>`);
  if (s.poster_state === 'error') pills.push(`<span class="pill error">image failed</span>`);
  if (s.model_name) pills.push(`<span class="pill model">${esc(s.model_icon || '')} ${esc(s.model_name)}</span>`);
  if (s.duration_ms) pills.push(`<span>${(s.duration_ms / 1000).toFixed(1)}s</span>`);
  if (s.content_len) pills.push(`<span>${(s.content_len / 1000).toFixed(1)}k chars</span>`);

  return `<div class="card ${streaming || posterGen ? 'live' : ''}">
    ${thumb}
    <div class="body">
      <p class="title"><a href="${esc(s.url)}" target="_blank" rel="noreferrer">${esc(s.title || s.url)}</a></p>
      <div class="meta">${pills.join('')}<span>${ago(s.updated_at)}</span></div>
      <p class="excerpt">${esc((s.excerpt || '').replace(/[#*`]/g, ''))}</p>
    </div>
    <button class="del" data-id="${esc(s.id)}">delete</button>
  </div>`;
}

async function refresh() {
  const { summaries = [] } = await api('/api/summaries');
  const liveSet = new Set();
  const live = summaries.filter((s) => {
    const l = s.gen_state === 'streaming' || s.poster_state === 'generating' || s.poster_state === 'queued';
    if (l) liveSet.add(s.id);
    return l;
  });
  const past = summaries.filter((s) => !liveSet.has(s.id));

  $('#live-wrap').hidden = live.length === 0;
  $('#live').innerHTML = live.map(card).join('');
  $('#past').innerHTML = past.length ? past.map(card).join('')
    : `<div class="empty-state">Nothing yet — hit ✨ on a YouTube video.</div>`;
  $('#count').textContent = `${summaries.length} summar${summaries.length === 1 ? 'y' : 'ies'}`;
  $('#tick').textContent = `updated ${new Date().toLocaleTimeString()}`;
}

document.addEventListener('click', async (e) => {
  const d = e.target.closest('.del');
  if (d) {
    if (!confirm('Delete this summary?')) return;
    await api(`/api/summaries/${encodeURIComponent(d.dataset.id)}`, { method: 'DELETE' });
    refresh();
    return;
  }
  const img = e.target.closest('.thumb[data-full]');
  if (img) { $('#lightbox-img').src = img.dataset.full; $('#lightbox').style.display = 'flex'; return; }
  if (e.target.closest('#lightbox')) $('#lightbox').style.display = 'none';
});

$('#save').onclick = () => {
  TOKEN = $('#tok').value.trim();
  if (!TOKEN) return;
  localStorage.setItem('summarizer_token', TOKEN);
  location.href = location.pathname;
};

if (!TOKEN) {
  $('#auth').hidden = false;
} else {
  $('#app').hidden = false;
  history.replaceState({}, '', location.pathname); // keep the token out of the URL bar
  refresh();
  setInterval(refresh, 3000); // cheap: one indexed D1 query, and it's how live jobs animate
}
</script>
</body>
</html>
